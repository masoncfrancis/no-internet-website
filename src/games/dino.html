<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jumping Game — You Don't Have Internet</title>
    <style>
      :root{--bg:#041014;--card:#07121a;--muted:#9bdc84;--accent:#39ff14}
      :root[data-theme="bw"]{--bg:#000;--card:#0b0b0b;--muted:#fff;--accent:#fff}
      body{margin:0;font-family:Courier,monospace;background:var(--bg);color:var(--muted);display:flex;align-items:center;justify-content:center;height:100vh}
      .card{width:100%;max-width:900px;padding:18px;background:var(--card);border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.5)}
      header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
      h1{font-size:1rem;margin:0;color:var(--accent)}
      #game{display:block;width:100%;height:300px;background:#08121a;border-radius:6px}
      .hud{display:flex;justify-content:space-between;color:var(--muted);font-size:0.95rem;margin-top:8px}
      button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:6px 10px;border-radius:6px}
      .big{font-size:1.1rem}
      @media (max-width:600px){#game{height:220px}}
    </style>
  </head>
  <body>
    <div class="card">
      <header>
        <h1>Jumping Game</h1>
        <div>
          <a href="/games.html" style="color:var(--muted);text-decoration:none">Back</a>
        </div>
      </header>
      <canvas id="game" tabindex="0" aria-label="Jumping Game canvas"></canvas>
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>High: <span id="high">0</span></div>
        <div><button id="restart">Restart</button></div>
      </div>
    </div>

    <script>
      (function(){
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let W=0,H=0, DPR = Math.max(1, window.devicePixelRatio || 1);
        function resize(){
          W = canvas.clientWidth; H = canvas.clientHeight;
          canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
          ctx.setTransform(DPR,0,0,DPR,0,0);
        }
        resize(); window.addEventListener('resize', resize);

        // Game state
        const groundY = 0.8; // percent of canvas height
        let player = {x:40,y:0,w:30,h:30,vy:0,alive:true,ground:0};
        let obstacles = [];
        let lastTime=0, spawnTimer=0, spawnInterval=1100, speed=300; // px/sec
        let score=0, high=0, running=false;

        // load highscore
        try{ high = parseInt(localStorage.getItem('jumping-high')||'0',10) || 0 }catch(e){high=0}
        document.getElementById('high').textContent = high;

        function start(){
          obstacles = []; player.vy=0; player.alive=true; score=0; spawnInterval=1100; speed=300; running=true; lastTime = performance.now(); requestAnimationFrame(loop);
        }

        function end(){
          running=false; player.alive=false; if(score>high){ high=score; try{localStorage.setItem('jumping-high', String(high)) }catch(e){} document.getElementById('high').textContent=high }
        }

        function spawn(){
          const h = 24 + Math.random()*30; const y = player.ground - h; const w = 18 + Math.random()*28; const x = W + 20;
          obstacles.push({x,w,y,h});
        }

        function loop(t){
          const dt = Math.min(50, t - lastTime); lastTime = t; if(!running) return draw();
          // update
          spawnTimer += dt; if(spawnTimer>spawnInterval){ spawnTimer=0; spawn(); spawnInterval = Math.max(600, spawnInterval*0.97); }
          // speed up gradually
          speed += dt * 0.02;
          // player physics
          player.vy += 2200 * (dt/1000); // gravity px/s^2 (higher for snappier jump)
          player.y += player.vy * (dt/1000);
          if(player.y > player.ground - player.h){ player.y = player.ground - player.h; player.vy = 0 }
          // obstacles
          for(let i=obstacles.length-1;i>=0;i--){ const o = obstacles[i]; o.x -= speed*(dt/1000); if(o.x + o.w < -50) obstacles.splice(i,1); else {
            // collision
            if(rectIntersect(player.x, player.y, player.w, player.h, o.x, o.y, o.w, o.h) && player.alive){ end() }
            // score when passed
            if(!o._scored && o.x + o.w < player.x){ o._scored=true; score++; document.getElementById('score').textContent = score }
          }}
          draw(); if(running) requestAnimationFrame(loop);
        }

        function rectIntersect(ax,ay,aw,ah,bx,by,bw,bh){ return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by }

        function draw(){
          ctx.clearRect(0,0,W,H);
          // background
          ctx.fillStyle = '#08121a'; ctx.fillRect(0,0,W,H);
          // ground
          const gy = Math.floor(H * groundY);
          ctx.fillStyle = '#0f2a1a'; ctx.fillRect(0, gy, W, H-gy);
          // player
          ctx.fillStyle = 'white'; ctx.fillRect(player.x, player.y, player.w, player.h);
          // obstacles
          ctx.fillStyle = '#d7d7d7'; obstacles.forEach(o=> ctx.fillRect(o.x, o.y, o.w, o.h));
          // overlay messages
          if(!running){ ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='white'; ctx.font='16px monospace'; ctx.textAlign='center'; ctx.fillText('Press Space or Tap to Start', W/2, H/2) }
        }

        // Input
        function jump(){ if(!player.alive) start(); else if(player.y >= player.ground - player.h - 0.5){ player.vy = -700 } }

        canvas.addEventListener('click', ()=>{ if(!running) start(); else jump(); });
        canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); if(!running) start(); else jump(); }, {passive:false});
        window.addEventListener('keydown', (e)=>{ if(e.code === 'Space' || e.code === 'ArrowUp'){ e.preventDefault(); if(!running) start(); else jump(); } });

        // initialize sizes and player ground
        function initSizes(){ const r = canvas.getBoundingClientRect(); W = r.width; H = r.height; player.ground = Math.floor(H * groundY); player.x = Math.floor(W * 0.08); player.w = Math.min(40, Math.floor(W*0.07)); player.h = player.w; player.y = player.ground - player.h; resize(); draw(); }
        window.addEventListener('load', initSizes); window.addEventListener('resize', initSizes);

        document.getElementById('restart').addEventListener('click', ()=>{ start() });

        // restore score display
        document.getElementById('score').textContent = score;

        // register SW if available
        if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('/sw.js').catch(()=>{}) }catch(e){}
        }

        // initial draw
        requestAnimationFrame((t)=>{ lastTime = t; initSizes(); draw(); });
      })();
    </script>
  </body>
</html>
