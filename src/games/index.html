<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Games — Portable Website</title>
    <script>
      try {
        const t = localStorage.getItem("pw-theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <style>
      :root {
        --bg: #041014;
        --card: #07121a;
        --muted: #9bdc84;
        --accent: #39ff14;
        --accent-rgb: 57, 255, 20;
      }
      :root[data-theme="bw"] {
        --bg: #000000;
        --card: #0b0b0b;
        --muted: #ffffff;
        --accent: #ffffff;
        --accent-rgb: 255, 255, 255;
      }
      :root[data-theme="amber"] {
        --bg: #0b0600;
        --card: #1a1200;
        --muted: #f6e3b4;
        --accent: #ffb020;
        --accent-rgb: 255, 176, 32;
      }
      :root[data-theme="cyan"] {
        --bg: #001219;
        --card: #071620;
        --muted: #bfefff;
        --accent: #00e5ff;
        --accent-rgb: 0, 229, 255;
      }
      body {
        font-family: "Courier New", Courier, monospace;
        padding: 18px;
        background: var(--bg);
        color: var(--muted);
      }
      a {
        color: var(--accent);
      }
      a:focus-visible {
        outline: 2px dashed rgba(var(--accent-rgb), 0.35);
        outline-offset: 3px;
      }
      header a {
        color: var(--muted);
      }
      /* Theme picker swatches (copied from homepage) */
      .theme-picker {
        margin-left: 6px;
      }
      .theme-swatch {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 0;
        cursor: pointer;
        box-shadow: 0 0 0 transparent;
      }
      .theme-swatch[aria-checked="true"] {
        outline: 2px solid var(--accent);
        box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.12);
      }
      .theme-swatch[aria-checked="false"] {
        opacity: 0.95;
      }
      .theme-swatch[data-theme="retro"] {
        background: #39ff14;
      }
      .theme-swatch[data-theme="bw"] {
        background: #ffffff;
      }
      .theme-swatch[data-theme="amber"] {
        background: #ffb020;
      }
      .theme-swatch[data-theme="cyan"] {
        background: #00e5ff;
      }
    </style>
    <script>
      // apply saved theme from localStorage
      (function () {
        try {
          const t = localStorage.getItem("pw-theme");
          if (t) document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header>
      <a href="../index.html">← Back</a>
      <div
        class="theme-picker"
        aria-label="Theme selector"
        role="radiogroup"
        style="
          display: inline-flex;
          gap: 8px;
          align-items: center;
          margin-left: 12px;
        "
      >
        <button
          class="theme-swatch"
          data-theme="retro"
          role="radio"
          aria-checked="false"
          title="Neon"
          aria-label="Neon theme"
        ></button>
        <button
          class="theme-swatch"
          data-theme="bw"
          role="radio"
          aria-checked="false"
          title="White on black"
          aria-label="White on black theme"
        ></button>
        <button
          class="theme-swatch"
          data-theme="amber"
          role="radio"
          aria-checked="false"
          title="Amber"
          aria-label="Amber theme"
        ></button>
        <button
          class="theme-swatch"
          data-theme="cyan"
          role="radio"
          aria-checked="false"
          title="Cyan"
          aria-label="Cyan theme"
        ></button>
      </div>
    </header>
    <main>
      <h1>Games</h1>
      <p>
        Example small games can be added here as standalone HTML files. Place
        each game in this folder and link to them.
      </p>
      <ul>
        <li>No games yet — add `tic-tac-toe.html` or similar.</li>
      </ul>
    </main>

    <script>
      // Theme swatches: make swatches interactive and keyboard-accessible
      (function () {
        const swatches = Array.from(document.querySelectorAll(".theme-swatch"));
        function applyTheme(t) {
          if (!t) t = "bw";
          document.documentElement.setAttribute("data-theme", t);
          swatches.forEach((s) => {
            const is = s.getAttribute("data-theme") === t;
            s.setAttribute("aria-checked", String(is));
            s.classList.toggle("active", is);
          });
        }
        try {
          const saved = localStorage.getItem("pw-theme") || "bw";
          applyTheme(saved);
        } catch (e) {
          applyTheme("bw");
        }

        swatches.forEach((s) => {
          s.tabIndex = 0;
          s.addEventListener("click", () => {
            const t = s.getAttribute("data-theme");
            try {
              localStorage.setItem("pw-theme", t);
            } catch (e) {}
            applyTheme(t);
          });
          s.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              s.click();
            }
          });
        });
      })();
    </script>
  </body>
</html>
