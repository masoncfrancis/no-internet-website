<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Articles — You Don't Have Internet</title>
    <script>
      try {
        const t = localStorage.getItem("pw-theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        console.log("Could not load saved theme", e);
      }
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <a href="index.html" class="brand">You Don't Have Internet</a>
        <nav aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="games.html">Games</a>
          <a href="articles.html" aria-current="page">Articles</a>
          <div
            class="theme-picker"
            aria-label="Theme selector"
            role="radiogroup"
          >
            <button
              class="theme-swatch"
              data-theme="retro"
              role="radio"
              aria-checked="false"
              title="Neon"
              aria-label="Neon theme"
            ></button>
            <button
              class="theme-swatch"
              data-theme="bw"
              role="radio"
              aria-checked="false"
              title="White on black"
              aria-label="White on black theme"
            ></button>
            <button
              class="theme-swatch"
              data-theme="amber"
              role="radio"
              aria-checked="false"
              title="Amber"
              aria-label="Amber theme"
            ></button>
            <button
              class="theme-swatch"
              data-theme="cyan"
              role="radio"
              aria-checked="false"
              title="Cyan"
              aria-label="Cyan theme"
            ></button>
          </div>
        </nav>
      </header>
      <main>
        <h1>Articles</h1>
        <p>Store offline-readable articles here as simple HTML files.</p>
        <ul>
          <li>No articles yet — add `welcome.html` or similar.</li>
        </ul>
      </main>
    </div>

    <script>
      (function () {
        const swatches = Array.from(document.querySelectorAll(".theme-swatch"));
        function applyTheme(t) {
          if (!t) t = "bw";
          document.documentElement.setAttribute("data-theme", t);
          swatches.forEach((s) => {
            const is = s.getAttribute("data-theme") === t;
            s.setAttribute("aria-checked", String(is));
            s.classList.toggle("active", is);
          });
        }
        try {
          const saved = localStorage.getItem("pw-theme") || "bw";
          applyTheme(saved);
        } catch (e) {
          applyTheme("bw");
        }
        swatches.forEach((s) => {
          s.tabIndex = 0;
          s.addEventListener("click", () => {
            const t = s.getAttribute("data-theme");
            try {
              localStorage.setItem("pw-theme", t);
            } catch (e) {}
            applyTheme(t);
          });
          s.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              s.click();
            }
          });
        });
      })();
    </script>
  </body>
</html>
