<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Readings — You Don't Have Internet</title>
    <script>
      try {
        const t = localStorage.getItem("pw-theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        console.log("Could not load saved theme", e);
      }
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <a href="index.html" class="brand">You Don't Have Internet</a>
        <button
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="main-nav"
          aria-label="Open menu"
        >
          <span class="bar"></span>
        </button>
        <nav id="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="games.html">Games</a>
          <a href="readings.html" aria-current="page">Readings</a>
        </nav>
        <div class="header-controls">
          <div
            class="theme-picker"
            aria-label="Theme selector"
            role="radiogroup"
          >
            <button
              class="theme-swatch"
              data-theme="retro"
              role="radio"
              aria-checked="false"
              title="Neon"
              aria-label="Neon theme"
            ></button>
            <button
              class="theme-swatch"
              data-theme="bw"
              role="radio"
              aria-checked="false"
              title="White on black"
              aria-label="White on black theme"
            ></button>
            <button
              class="theme-swatch"
              data-theme="amber"
              role="radio"
              aria-checked="false"
              title="Amber"
              aria-label="Amber theme"
            ></button>
            <button
              class="theme-swatch"
              data-theme="cyan"
              role="radio"
              aria-checked="false"
              title="Cyan"
              aria-label="Cyan theme"
            ></button>
          </div>
        </div>
      </header>

      <main>
        <h1>Readings</h1>
        <p>Store offline-readable readings here as simple HTML files.</p>
        <ul id="articles-list">
          <li>Loading articles…</li>
        </ul>
      </main>
    </div>

    <script>
      (function () {
        // Fetch and render articles from articles.json
        const list = document.getElementById("articles-list");
        function showMessage(msg) {
          if (!list) return;
          list.innerHTML = "";
          const li = document.createElement("li");
          li.textContent = msg;
          list.appendChild(li);
        }

        if (list) {
          fetch("articles.json")
            .then((resp) => {
              if (!resp.ok) throw new Error("Network response was not ok");
              return resp.json();
            })
            .then((data) => {
              list.innerHTML = "";
              if (!Array.isArray(data) || data.length === 0) {
                showMessage("No articles yet.");
                return;
              }
              data.forEach((a) => {
                const li = document.createElement("li");
                const aLink = document.createElement("a");
                aLink.href = a.url || "#";
                aLink.textContent = a.title || "Untitled";
                li.appendChild(aLink);
                if (a.date) {
                  const meta = document.createElement("div");
                  meta.className = "meta";
                  const d = new Date(a.date);
                  meta.textContent = isNaN(d) ? a.date : d.toLocaleDateString();
                  li.appendChild(meta);
                }
                if (a.excerpt) {
                  const p = document.createElement("p");
                  p.className = "excerpt";
                  p.textContent = a.excerpt;
                  li.appendChild(p);
                }
                list.appendChild(li);
              });
            })
            .catch((err) => {
              console.error(err);
              showMessage("Could not load articles.");
            });
        }

        // Theme swatches initializer
        const swatches = Array.from(document.querySelectorAll(".theme-swatch"));
        function applyTheme(t) {
          if (!t) t = "bw";
          document.documentElement.setAttribute("data-theme", t);
          swatches.forEach((s) => {
            const is = s.getAttribute("data-theme") === t;
            s.setAttribute("aria-checked", String(is));
            s.classList.toggle("active", is);
          });
        }
        try {
          const saved = localStorage.getItem("pw-theme") || "bw";
          applyTheme(saved);
        } catch (e) {
          applyTheme("bw");
        }
        swatches.forEach((s) => {
          s.tabIndex = 0;
          s.addEventListener("click", () => {
            const t = s.getAttribute("data-theme");
            try {
              localStorage.setItem("pw-theme", t);
            } catch (e) {}
            applyTheme(t);
          });
          s.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              s.click();
            }
          });
        });

        // Mobile nav toggle
        (function () {
          const btn = document.querySelector(".nav-toggle");
          const header = document.querySelector("header");
          const nav = document.getElementById("main-nav");
          if (!btn || !header || !nav) return;
          btn.addEventListener("click", () => {
            const open = btn.getAttribute("aria-expanded") === "true";
            btn.setAttribute("aria-expanded", String(!open));
            header.classList.toggle("nav-open", !open);
            if (!open) {
              const first = nav.querySelector("a");
              if (first) first.focus();
            }
          });
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && header.classList.contains("nav-open")) {
              btn.setAttribute("aria-expanded", "false");
              header.classList.remove("nav-open");
              btn.focus();
            }
          });
        })();
      })();
    </script>
  </body>
</html>
